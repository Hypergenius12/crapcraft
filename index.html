<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CrapCraft</title>
    <meta name="description" content="Explore infinite procedurally generated planets with dungeons, magic wands, and epic bossfights.">
    <link rel="stylesheet" href="css/style.css?v=2">
    <link rel="stylesheet" href="css/geometric.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>💩</text></svg>">
</head>
<body>
    <canvas id="game-canvas"></canvas>

    <!-- Start Screen -->
    <div id="start-screen">
        <div class="start-content">
            <h1 class="game-title" style="font-family: 'Comic Sans MS', 'Chalkboard SE', 'Marker Felt', sans-serif; font-size: 6rem; text-transform: none; text-shadow: 4px 4px 0 #5c3a21; letter-spacing: -2px; transform: rotate(-3deg);">
                <span style="color: #8b5a2b;">Crap</span><span style="color: #4da64d;">Craft</span>
            </h1>
            <p class="subtitle" style="font-family: 'Comic Sans MS'; color: #aa8866; font-size: 1.5rem; margin-top: -10px;">It's literally dirt. Enjoy.</p>
            <div class="start-actions">
                <button id="btn-new-game" class="menu-btn primary">New Game</button>
            </div>
            <p class="start-hint">Click to lock mouse · WASD to move · Space to jump</p>
        </div>
    </div>

    <!-- Pause Menu -->
    <div id="pause-screen" class="hidden">
        <div class="start-content">
            <h1 class="game-title" style="font-size: 3rem;">Paused</h1>
            <div class="start-actions" style="margin-top: 2rem;">
                <button id="btn-resume" class="menu-btn primary">Resume</button>
                <div style="margin: 20px 0; background: rgba(0,0,0,0.5); padding: 20px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1);">
                    <label style="display: block; color: white; margin-bottom: 10px; font-family: 'Outfit';">Render Distance: <span id="render-distance-val">8</span></label>
                    <input type="range" id="render-distance-slider" min="2" max="16" value="8" style="width: 100%; cursor: pointer;">
                </div>
                <button id="btn-quit" class="menu-btn">Quit to Title</button>
            </div>
        </div>
    </div>

    <!-- Debug Info (F3 Menu) -->
    <div id="debug-info" class="hidden" style="position: absolute; top: 10px; left: 10px; color: white; text-shadow: 1px 1px 0 #000; font-family: 'JetBrains Mono', monospace; font-size: 14px; pointer-events: none; z-index: 1000; background: rgba(0,0,0,0.5); padding: 10px; border-radius: 5px;">
        <div id="debug-fps">FPS: 0</div>
        <div id="debug-pos">XYZ: 0, 0, 0</div>
        <div id="debug-biome">Biome: None</div>
        <div id="debug-block">Looking at: None</div>
    </div>
    <!-- HUD overlay for the game -->
    <div id="error-overlay" style="display:none; position:absolute; top:10%; left:10%; right:10%; background:rgba(255,0,0,0.8); color:white; padding:20px; z-index:9999; font-family:monospace; border:3px solid white; white-space:pre-wrap;"></div>
    <script>
        window.onerror = function(msg, url, lineNo, columnNo, error) {
            var el = document.getElementById('error-overlay');
            el.style.display = 'block';
            el.innerHTML += "ERROR: " + msg + "\nURL: " + url + "\nLine: " + lineNo + ":" + columnNo + "\n" + (error ? error.stack : "") + "\n\n";
            return false;
        };
        window.addEventListener("unhandledrejection", function(e) {
            var el = document.getElementById('error-overlay');
            el.style.display = 'block';
            el.innerHTML += "UNHANDLED PROMISE REJECTION: " + e.reason + "\n\n";
        });
    </script>
    
    <!-- Geometric UI overlay -->
    <div id="geometric-ui" class="hidden">
        <div class="inv-wrapper">
            <!-- Equipment column -->
            <div class="equipment-col">
                <div class="inv-slot armor-slot" data-slot="head"></div>
                <div class="inv-slot armor-slot" data-slot="chest"></div>
                <div class="inv-slot armor-slot" data-slot="legs"></div>
                <div class="inv-slot armor-slot" data-slot="boots"></div>
                <div style="height: 20px;"></div>
                <div class="inv-slot offhand-slot" data-slot="offhand"></div>
            </div>
            
            <div class="main-inv-col">
                <!-- Main grid (3 rows of 9) -->
                <div class="main-grid" id="main-inventory-grid">
                    <!-- Filled by JS -->
                </div>
                
                <div style="height: 20px;"></div>
                
                <!-- Inventory separated hotbar -->
                <div class="main-grid" id="inv-hotbar-grid" style="grid-template-rows: 60px;">
                    <!-- Filled by JS -->
                </div>
            </div>

            <!-- Wand Configurator -->
            <div class="wand-config-col hidden" id="wand-config-panel">
                <div style="color: white; font-weight: bold; margin-bottom: 10px; font-size: 1.2rem;" id="wand-config-title">Wand Configuration</div>
                <div class="wand-slots-grid" id="wand-slots-grid" style="display: grid; grid-template-columns: repeat(2, 60px); gap: 10px;">
                    <!-- Filled by JS -->
                </div>
            </div>
        </div>
    </div>
    
    <!-- Item Tooltip -->
    <div id="item-tooltip" class="hidden"></div>
    
    <!-- Dragging Item Icon -->
    <div id="drag-item-icon" class="hidden"></div>

    <!-- Always visible geometric hotbar -->
    <div id="geometric-hotbar">
        <div class="hotbar-grid" id="main-hotbar-grid">
            <!-- Filled by JS -->
        </div>
    </div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js"
        }
    }
    </script>
    <script type="module" src="js/main.js?v=6"></script>
</body>
</html>
